name: Deploy SendAPro

on:
  push:
    branches: [main]

jobs:
  # ─── Job 1: Lint + Test ───
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for buf breaking check

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'fixflow-backend/go.mod'
          cache: true
          cache-dependency-path: fixflow-backend/go.sum

      - name: Install buf CLI
        run: |
          curl -sSL \
            "https://github.com/bufbuild/buf/releases/latest/download/buf-Linux-x86_64" \
            -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf

      - name: Install protoc plugins
        working-directory: fixflow-backend
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest

      - name: Buf lint proto files
        working-directory: fixflow-backend
        run: buf lint proto/
        continue-on-error: true

      - name: Buf breaking change check
        working-directory: fixflow-backend
        run: |
          buf breaking proto/ \
            --against ".git#branch=main,subdir=fixflow-backend/proto"
        continue-on-error: true  # warn only on first run

      - name: Generate gRPC stubs
        working-directory: fixflow-backend
        run: buf generate proto/

      - name: Go vet
        working-directory: fixflow-backend
        run: go vet ./cmd/... ./internal/... ./pkg/...

      - name: Go test
        working-directory: fixflow-backend
        run: |
          go test ./cmd/... ./internal/... ./pkg/... \
            -short \
            -cover \
            -coverprofile=coverage.out \
            -timeout 120s \
            -race

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: fixflow-backend/coverage.out

      - name: Frontend lint
        working-directory: fixflow-frontend
        run: |
          npm ci
          npm run lint
          npx tsc --noEmit

  # ─── Job 2: Build & Push Backend Docker Image ───
  build-push:
    name: Build & Push Backend
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./fixflow-backend
          file: ./fixflow-backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/sendapro-backend:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/sendapro-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64


