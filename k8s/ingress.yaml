apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fixflow-ingress
  namespace: fixflow
  annotations:
    # Use AWS Application Load Balancer (ALB) Controller
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # Listen on HTTP (80) and HTTPS (443)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    
    # Redirect HTTP traffic to HTTPS automatically
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    
    # SSL certificate from AWS Certificate Manager (ACM)
    # Note: Uncomment and replace with your actual Certificate ARN after purchasing your domain
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:YOUR_AWS_REGION:YOUR_AWS_ACCOUNT_ID:certificate/YOUR_ACM_CERTIFICATE_UUID
    
    # Connection timeouts (Websocket support)
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600
    
    # Max body size for uploads (e.g. 20MB)
    alb.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: alb
  rules:
    - host: api.fixflow.in # Replace this with your backend subdomain (e.g., api.yourdomain.com)
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fixflow-backend-service
                port:
                  number: 8080
