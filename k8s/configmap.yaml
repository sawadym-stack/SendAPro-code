apiVersion: v1
kind: ConfigMap
metadata:
  name: sendapro-config
  namespace: sendapro
data:
  HTTP_PORT: "8080"
  GRPC_PORT: "50051"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  MINIO_BUCKET: "sendapro"
  MINIO_USE_SSL: "true"
  OTEL_SERVICE_NAME: "sendapro-backend"
  REDIS_URL: "redis-service:6379"
