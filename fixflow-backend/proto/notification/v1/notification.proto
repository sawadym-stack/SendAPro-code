syntax = "proto3";

package notification.v1;

option go_package = "github.com/yourname/fixflow-backend/internal/adapter/grpc/pb/notification/v1;notificationv1";

service NotificationService {
  rpc CreateNotification(CreateNotificationRequest) returns (CreateNotificationResponse);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (MarkNotificationReadResponse);
  rpc StreamNotifications(StreamNotificationsRequest) returns (stream NotificationEvent);
}

message Notification {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string message = 4;
  string type = 5;
  bool is_read = 6;
  string created_at = 7;
}

message CreateNotificationRequest {
  string user_id = 1;
  string title = 2;
  string message = 3;
  string type = 4;
}
message CreateNotificationResponse { Notification notification = 1; }

message ListNotificationsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}
message ListNotificationsResponse {
  repeated Notification notifications = 1;
  int32 unread_count = 2;
}

message MarkNotificationReadRequest {
  string notification_id = 1;
  string user_id = 2;
}
message MarkNotificationReadResponse { bool success = 1; }

message StreamNotificationsRequest { string user_id = 1; }

message NotificationEvent {
  string event_type = 1;
  Notification notification = 2;
}
