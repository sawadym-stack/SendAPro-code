syntax = "proto3";

package payment.v1;

import "google/api/annotations.proto";

option go_package = "github.com/yourname/fixflow-backend/internal/adapter/grpc/pb/payment/v1;paymentv1";

service PaymentService {
  rpc GenerateInvoice(GenerateInvoiceRequest) returns (GenerateInvoiceResponse) {
    option (google.api.http) = {
      post: "/v1/payments/invoice"
      body: "*"
    };
  }
  rpc CreatePaymentOrder(CreatePaymentOrderRequest) returns (CreatePaymentOrderResponse) {
    option (google.api.http) = {
      post: "/v1/payments/order"
      body: "*"
    };
  }
  rpc VerifyAndCapture(VerifyAndCaptureRequest) returns (VerifyAndCaptureResponse) {
    option (google.api.http) = {
      post: "/v1/payments/verify"
      body: "*"
    };
  }
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse) {
    option (google.api.http) = {
      get: "/v1/payments/history"
    };
  }
  rpc GetInvoice(GetInvoiceRequest) returns (GetInvoiceResponse) {
    option (google.api.http) = {
      get: "/v1/payments/invoice/{job_id}"
    };
  }
}

message MaterialItem {
  string description = 1;
  int32 quantity = 2;
  double unit_price = 3;
}

message GenerateInvoiceRequest {
  string job_id = 1;
  double labour_charge = 2;
  repeated MaterialItem material_items = 3;
}

message InvoiceItemPB {
  string description = 1;
  int32 quantity = 2;
  double unit_price = 3;
  double total = 4;
}

message GenerateInvoiceResponse {
  string invoice_id = 1;
  string pdf_url = 2;
  double total = 3;
  repeated InvoiceItemPB line_items = 4;
}

message CreatePaymentOrderRequest {
  string job_id = 1;
  string idempotency_key = 2;
}

message CreatePaymentOrderResponse {
  string order_id = 1;
  int64 amount = 2;
  string currency = 3;
  string key_id = 4;
}

message VerifyAndCaptureRequest {
  string order_id = 1;
  string payment_id = 2;
  string signature = 3;
}

message VerifyAndCaptureResponse {
  bool success = 1;
  string payment_id = 2;
}

message GetHistoryRequest {
  int32 page = 1;
  int32 limit = 2;
}

message PaymentPB {
  string id = 1;
  string job_id = 2;
  string customer_id = 3;
  string technician_id = 4;
  double amount = 5;
  string currency = 6;
  string status = 7;
  string razorpay_order_id = 8;
  string razorpay_payment_id = 9;
  string idempotency_key = 10;
  string failure_reason = 11;
  string created_at = 12;
  string updated_at = 13;
}

message GetHistoryResponse {
  repeated PaymentPB payments = 1;
  int32 total = 2;
}

message GetInvoiceRequest {
  string job_id = 1;
}

message GetInvoiceResponse {
  string id = 1;
  string job_id = 2;
  string payment_id = 3;
  string customer_name = 4;
  string tech_name = 5;
  string service_type = 6;
  repeated InvoiceItemPB line_items = 7;
  double subtotal = 8;
  double tax_rate = 9;
  double tax_amount = 10;
  double total = 11;
  string pdf_url = 12;
  string created_at = 13;
}

